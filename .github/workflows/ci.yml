name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Syntax check
        run: node --check server.js

      - name: Boot smoke test
        run: |
          BRIDGE_PORT=19999 node server.js &
          SERVER_PID=$!
          sleep 1
          curl -fsS http://localhost:19999/health
          kill $SERVER_PID

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm to 11.5.1+ for OIDC trusted publishing
        run: npm install -g npm@latest && npm --version

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Debug OIDC claims
        run: |
          TOKEN=$(curl -sSL -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm")
          PAYLOAD=$(echo "$TOKEN" | jq -r '.value' | cut -d. -f2)
          PAD=$(printf '%0.s=' $(seq 1 $((4 - ${#PAYLOAD} % 4))))
          echo "$PAYLOAD$PAD" | base64 -d 2>/dev/null | jq '{iss, sub, repository, repository_owner, workflow_ref, job_workflow_ref, ref, ref_type, environment}' || echo "claims decode failed"

      - name: Publish to npm
        run: npm publish --access public --provenance
